{% extends 'admin/admin_index.html' %}

{% block content %}

<div class="container mt-5">

    <h2>Add Beauty Service</h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <label>Service Name:</label><br>
        <input type="text" name="name" required class="form-control"><br><br>


        <label>Description:</label><br>
        <textarea name="description" required class="form-control"></textarea><br><br>


        <label>Price:</label><br>
        <input type="number" name="price" step="0.01" required class="form-control"><br><br>


        <label>Duration (minutes):</label><br>
        <input type="number" name="duration" required class="form-control"><br><br>


        <label>Image:</label><br>
        <input type="file" name="image" required class="form-control"><br><br>


        <button type="submit" class="btn btn-primary">
            Add Beauty Service
        </button>


    </form>


    <br>

    <a href="{% url 'admin_index' %}" class="btn btn-secondary">
        Back to Dashboard
    </a>


</div>
<br>

{% endblock %}
