{% extends "index.html" %}

{% block content %}

<div class="container mt-5">
    <div class="card shadow-lg">
        
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">💬 Gemini AI Chat</h4>
        </div>

        <div class="card-body" style="height:400px; overflow-y:auto; background:#f8f9fa;">
            
            {% if response %}
            <div class="mb-3 text-end">
                <span class="badge bg-secondary">You</span>
                <div class="p-2 mt-1 bg-light border rounded">
                    {{ request.POST.message }}
                </div>
            </div>

            <div class="mb-3">
                <span class="badge bg-success">Gemini</span>
                <div class="p-2 mt-1 bg-white border rounded shadow-sm">
                    {{ response }}
                </div>
            </div>
            {% else %}
            <p class="text-muted">Ask something to Gemini AI...</p>
            {% endif %}

        </div>

        <div class="card-footer">
            <form method="POST">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" 
                           name="message" 
                           class="form-control" 
                           placeholder="Type your message..." 
                           required>

                    <button class="btn btn-primary" type="submit">
                        Send
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>

{% endblock %}
